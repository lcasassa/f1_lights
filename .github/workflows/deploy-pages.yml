name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Verify emcc
        run: emcc --version

      - name: Build WASM + Vite
        run: make web

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - uses: actions/deploy-pages@v4
        id: deployment
