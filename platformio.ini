[platformio]
default_envs = pro16MHzatmega328

[env:pro16MHzatmega328]
platform = atmelavr
board = pro16MHzatmega328
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> -<main_test.cpp>

[env:pro16MHzatmega328-test]
platform = atmelavr
board = pro16MHzatmega328
framework = arduino
monitor_speed = 115200
build_src_filter = +<main_test.cpp>

[env:screen]
platform = atmelavr
board = pro16MHzatmega328
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../screen/main.cpp>
build_flags = -DSERIAL_TX_BUFFER_SIZE=16 -DSERIAL_RX_BUFFER_SIZE=16

[env:screen-diag]
platform = atmelavr
board = pro16MHzatmega328
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../screen/main_diag.cpp>
build_flags = -DSERIAL_TX_BUFFER_SIZE=16 -DSERIAL_RX_BUFFER_SIZE=16

[env:screen-dino]
platform = atmelavr
board = pro16MHzatmega328
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../screen/main_dino.cpp>
build_flags = -DSERIAL_TX_BUFFER_SIZE=16 -DSERIAL_RX_BUFFER_SIZE=16

[env:esp32-c3-supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../esp32/*.cpp>
; ESP32-C3 Super Mini uses the built-in USB Serial/JTAG (no CP210x/CH340).
; These flags route uploads & Serial through the native USB CDC.
; I2C on GPIO 4 (SDA) / 5 (SCL): no strapping role, frees onboard LED on 8
; and the BOOT button on 9. Only conflict is JTAG, unused here.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DI2C_SDA=4
    -DI2C_SCL=5
; OTA-capable partition layout (2x ~1.9 MB app slots + SPIFFS).
board_build.partitions = default.csv
upload_protocol = esptool
upload_speed = 921600

; Same firmware, but uploaded over WiFi via ArduinoOTA / mDNS.
; First flash must still be done over USB with `esp32-c3-supermini`.
[env:esp32-c3-supermini-ota]
extends = env:esp32-c3-supermini
upload_protocol = espota
upload_port = f1-esp32.local
upload_flags =
    --auth=f1ota
    --port=3232

; Lean OTA env for fast dev iteration: drops the GitHub self-updater
; (HTTPClient + HTTPUpdate + WiFiClientSecure / mbedTLS), shaving ~100–
; 150 KB off the OTA payload. Wire-OTA via ArduinoOTA still works.
[env:esp32-c3-supermini-ota-fast]
extends = env:esp32-c3-supermini-ota
build_flags =
    ${env:esp32-c3-supermini.build_flags}
    -DDISABLE_GITHUB_OTA=1

; Segment-bit scanner: helps identify which physical segment each HT16K33
; bit drives on your specific 14-seg backpack. Watch the panel + serial
; monitor (115200 baud). The scanner always probes ALL 8 COM lines
; (digits 0..7), so wired-in-parallel LEDs respond regardless of which
; digit they live on. SEGMENT_SCAN is now a boolean: 1 = enabled.
;
; Flashed over USB (not OTA) — debug builds shouldn't depend on the
; network being healthy.
[env:esp32-c3-supermini-segscan]
extends = env:esp32-c3-supermini
build_flags =
    ${env:esp32-c3-supermini.build_flags}
    -DDISABLE_GITHUB_OTA=1
    -DSEGMENT_SCAN=1

